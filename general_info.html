<!doctype html>
<html class="no-js" lang="en">
<head>
  <meta charset="utf-8">
  <meta http-equiv="x-ua-compatible" content="ie=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Frontier of Biotech Workshop</title>
  <link rel="stylesheet" href="css/app.css">
  <script>
    function includeHTML() {
      var z, i, elmnt, file, xhttp;
      z = document.getElementsByTagName("*");
      for (i = 0; i < z.length; i++) {
        elmnt = z[i];
        file = elmnt.getAttribute("w3-include-html");
        if (file) {
          xhttp = new XMLHttpRequest();
          xhttp.onreadystatechange = function() {
            if (this.readyState == 4) {
              if (this.status == 200) {elmnt.innerHTML = this.responseText;}
              if (this.status == 404) {elmnt.innerHTML = "Page not found.";}
              elmnt.removeAttribute("w3-include-html");
              includeHTML();
            }
          };
          xhttp.open("GET", file, true);
          xhttp.send();
          return;
        }
      }
    }
  </script>
</head>
<body>

  <!-- Header -->
  <div w3-include-html="header.html"></div>

  <!-- Banner -->
  <div w3-include-html="banner.html"></div>

  <!-- Navigation Menu -->
  <div class="row">
    <div w3-include-html="navigator.html"></div>

    <!-- Main Content -->
    <div id="content-block" class="medium-9 columns">
      <h1>General Information</h1>
      <p>For visa requirements and travel information, visit: <a href="https://leo3233.github.io/Frontier-of-Biotech/general-info/visa-and-travel">Visa and Travel</a></p>
      <p>Explore accommodation options in the Tseung Kwan O and Kwun Tong district: <a href="https://leo3233.github.io/Frontier-of-Biotech/general-info/accomodation">Accommodation</a></p>
      <p>Find directions to HKUST for your convenience: <a href="https://leo3233.github.io/Frontier-of-Biotech/general-info/transportation">Direction to HKUST</a></p>
    </div>
    </div>
  </div>

  <!-- Footer -->
  <div w3-include-html="footer.html"></div>
  
  <script>
    includeHTML();
  </script>
</body>
</html>
